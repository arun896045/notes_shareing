{% extends 'admin_nav.html' %}
{% load static %}
{% block body %}
 
<div class="container mt-3">
<h4 class="text-center text-danger">Assign Status</h4>
<hr>
<div class="w-100 d-flex justify-content-center">
    <form method='POST' class="w-50 ">
        {% csrf_token %}
 <label>Notes ID</label>
 <input type="text" name="notesid" class=form-control value="{{id}}" readonly>
 <label>Status</label>
 <select name="status" class="form-control">
    <option >---select--</option>
 <option value="Accept">Accept</option>
 <option value="Reject">Reject</option>
 </select>
 <br>
 <input type="submit" value="button">
</form>
</div>
</div>
{% if error == "no" %}
<script>
    alert("Status Updated Succefull!");
    window.location=('{% url "assign_status" id %}');
</script>
{% endif %}
{% if error == "yes" %}
<script>
    alert("Something went wrong ,Try Again");
</script>
{% endif %}
{% endblock body %}
