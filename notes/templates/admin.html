{% extends 'nvigate.html' %}
{% load static %}
{% block body %}
{% if error == "no" %}
<script>
alert('Logged In Successfully');
window.location=("{% url 'admin_home' %}");
</script>
{% endif %}
{% if error == "yes" %}
<script>
    alert('Invalid Login Credentials,Try Again');
    </script>
{% endif %}
<div class="container mt-3" style="background-color:whitesmoke ;">
    <div class="row">
        <div class="col-sm-6">
            <img src="{% static 'images/admin.webp' %}" alt="" class="img-thumbnail my-2">
         </div>
         <div class="col-sm-6">
            <h4 class="text-center" >Admin Login</h4>
            <p>Enter your UserName and Password for access Admin Panel</p>

            <hr>
           <form  method="POST">
            {% csrf_token %}
             <label for="">UserName:</label>
             <input type="text" class="form-control" placeholder="Enter Username" name="uname">
              <label for="">Password:</label>
              <input type="password" class="form-control" placeholder="Enter Password" name="pwd">
              <input type="submit" class="btn btn-danger mt-2" value="LOGIN">
           </form>
        </div>
    </div>
</div>

{% endblock body %}
