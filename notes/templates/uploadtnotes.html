{% extends 'usernavigation.html' %}
{% load static %}
{% block body %}

{% if error == "no" %}
<script>
alert('UploadFiles  Successfully');

</script>
{% endif %}
{% if error == "yes" %}
<script>
    alert('Somethings went wrong,Try Again');
    </script>
{% endif %}

<div class="container mt-5">
    <div class="row">    
       <div class="col-sm-6">
          <h4 class="text-center" >UPLOAD NOTES</h4>
            <hr>
            <form  method="POST" enctype="multipart/form-data">
                  {% csrf_token %}
             <label >Branch</label>
             <select name="branch" class="form-control" >
               <option > ---Select Branch---</option>
               <option value="Computer Science">Computer Science</option>
               <option value="Mechanical">Mechanical</option>
               <option value="Civil">Civil</option>
               <option value="Electrical">Electrical</option>
               <option value="Electronics">Electronics</option>
             </select>
                  <label >Subject</label>
              <input type="text" class="form-control" placeholder="Enter subject" name="subject">
              <label for="">Notes Files</label>
              <input type="file" class="form-control" name="notesfile">
              <label >File Type</label>
                <select name="filetype" class="form-control" >
               <option > ---Select File Type---</option>
               <option value="PDF">PDF</option>
               <option value="PPT">PPT</option>
               <option value="DOC">DOC/DOCK</option>
               <option value="TXT">TXT</option>
               <option value="Image">Image</option>
               <option value="zip">ZIP file</option>
             </select>
              <label >Description</label>
              <textarea name="description" class="form-control"></textarea>
              <input type="submit" class="btn btn-danger mt-2" value="submit">
           </form>
        </div>
         <div class="col-sm-6 pt-5">
           <img src="{% static 'images/upload.PNG' %}" alt="" class="img-fluid" style="max-width:100%;height:50vh">
              </div>
         
    </div>
</div>
{% endblock body %}
