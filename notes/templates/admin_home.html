 {% extends "admin_nav.html" %} 
 {% load static %}
 {% block body %}
 <style>
    .container1{
        background-color: lightgray;
        border-radius: 8px;
    }
    h3,h5{
        padding: 10px;
    }
    .mydiv:hover{
        transform: translateY(-10px);
    }
 </style>
 <div class="container mt-4">
    <div class="row">
        <div class="col-sm-3 text-center">
            <div class="container1 mydiv">
                <h3 class="text-primary">{{p}}</h3>
                <a href="{% url 'pending' %}"><h5 class="text-dark">Pending Notes</h5></a>
            </div>
        </div>
        <div class="col-sm-3 text-center">
            <div class="container1 mydiv">
                <h3 class="text-primary">{{a}}</h3>
                <a href="{% url 'accept' %}"><h5 class="text-dark">Accepted Notes</h5></a>
            </div>
        </div>
        <div class="col-sm-3 text-center">
            <div class="container1 mydiv">
                <h3 class="text-primary">{{r}}</h3>
                <a href="{% url 'reject' %}"><h5 class="text-dark">Rejected notes</h5></a>
            </div>
        </div>
        <div class="col-sm-3 text-center">
            <div class="container1 mydiv">
                <h3 class="text-primary ">{{all}}</h3>
                <a href="{% url 'all_notes' %}"><h5 class="text-dark">All Notes</h5></a>
            </div>
        </div>
        
    </div>
 </div>
