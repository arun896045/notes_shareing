{% extends "usernavigation.html" %}
{% load static %} 
{% block body %}
<div class="container mt-1">
    <h4 class="text-center">Edit Profile</h4>
    <hr>
    <div class="row">
        <div class="col-sm-6">
        <form method="POST">
            {% csrf_token %}
            <div class="form-row ">
                <div class="form-group col-sm-6 m-0">
                    <label >FirstName</label>
                    <input type="text" class="form-control" value="{{ data.user.first_name }}" name="fname">
                </div>
                 <div class="form-group col-sm-6">
                    <label >LastName</label>
                    <input type="text" class="form-control" value="{{ data.user.last_name }}" name="lname">
                </div>
            </div> 
            
            <div class="form-row ">
                <div class="form-group col-sm-12">
                    <label >EmailId</label>
                    <input type="text" class="form-control " value="{{ data.user.username }}" name="fistName" readonly>
                </div>
            </div> 
            <div class="form-row">
                <div class="form-group col-sm-12">
                    <label >Contact</label>
                    <input type="text" class="form-control" value="{{ data.contact }}" name="contact">
                </div>
            </div> 
             <div class="form-row">
                <div class="form-group col-sm-6">
                    <label >Branch</label>
                    <select name="branch" class="form-control" >
                         <option value="Computer Science">Computer Science</option>
                          <option value="Mechanical">Mechanical</option>
                          <option value="Civil">Civil</option>
                          <option value="Electrical">Electrical</option>
                          <option value="Electronics">Electronics</option>
                      </select>
                </div>
                <div class="form-group col-sm-6 ">
                    
                    <br>
                    <input type="text" class="form-control" value="{{data.branch}}">
                </div>
                
            </div> 
            <input type="submit" value="Update" class="btn btn-primary mt-3">
        </form>
    </div>
</div>

</div>
{% if error %}
<script>
    alert("Edit successful");
    window.location=('{% url "profile" %}')
</script>
{% endif %}
{% endblock body %}
